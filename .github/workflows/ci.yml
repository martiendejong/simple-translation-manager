name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:

jobs:
  php-tests:
    name: PHP unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: pcov
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPUnit
        run: vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: Determine base ref for diff coverage
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=200
            echo "ref=origin/${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Diff coverage gate (>=80% of touched lines)
        run: php bin/diff-coverage.php coverage.xml "${{ steps.base.outputs.ref }}" 80

      - name: WordPress integration smoke test source checks
        run: php -l tests/wp-integration-smoke.php

  js-tests:
    name: JS unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest with coverage
        run: npx jest --coverage --coverageReporters=lcov --coverageReporters=text

      - name: Determine base ref for diff coverage
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=200
            echo "ref=origin/${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Diff coverage gate (>=80% of touched lines)
        run: node bin/diff-coverage.js coverage/lcov.info "${{ steps.base.outputs.ref }}" 80

  php-lint:
    name: PHP lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Lint all PHP files
        run: |
          find . -name '*.php' -not -path './vendor/*' -not -path './node_modules/*' -print0 \
            | xargs -0 -n1 php -l
